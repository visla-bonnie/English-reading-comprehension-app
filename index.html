<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Reading and Comprehension App V2</title>
  <style>
    :root{
      --ink:#0f172a; --muted:#64748b; --blue:#2563eb; --bg1:#f8fafc; --bg2:#dbeafe;
      --card:#ffffff; --line:#e2e8f0; --green:#16a34a; --orange:#f97316; --purple:#7c3aed;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial, Helvetica, sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--ink)}
    .wrap{max-width:1220px;margin:0 auto;padding:24px}
    .hero{background:white;border-radius:26px;padding:28px;box-shadow:0 8px 30px rgba(15,23,42,.08);display:grid;grid-template-columns:1fr 260px;gap:20px;align-items:center}
    h1{font-size:42px;margin:0 0 10px}
    h2{margin-top:0}
    p{line-height:1.6}
    .muted{color:var(--muted)}
    .nav{display:flex;flex-wrap:wrap;gap:10px;margin:22px 0}
    button{border:0;border-radius:14px;padding:12px 16px;background:white;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;font-size:15px;color:var(--ink)}
    button:hover{transform:translateY(-1px)}
    button.active{background:var(--ink);color:white}
    .btn-dark{background:var(--ink);color:white}
    .btn-soft{background:#eff6ff;color:#1d4ed8}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
    .two{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:20px}
    .card,.chapter{background:white;border-radius:22px;padding:22px;box-shadow:0 4px 18px rgba(15,23,42,.07)}
    .chapter{margin-bottom:16px}
    .mini{border-radius:18px;padding:18px}
    input,textarea,select{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:14px;padding:13px;font-size:15px;background:white}
    textarea{min-height:320px}
    pre{white-space:pre-wrap;background:#020617;color:#f8fafc;padding:18px;border-radius:16px;max-height:650px;overflow:auto}
    .progressBox{background:#0f172a;color:white;border-radius:22px;padding:22px}
    .bar{height:12px;border-radius:999px;background:#334155;overflow:hidden;margin-top:12px}
    .bar span{display:block;height:100%;background:#22c55e;width:0%}
    .checkRow{display:flex;justify-content:space-between;gap:12px;align-items:center;width:100%;background:#f8fafc;border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:none;text-align:left}
    .done{color:var(--green);font-weight:bold}
    .pill{display:inline-block;border-radius:999px;padding:6px 10px;background:#eff6ff;color:#1d4ed8;font-size:13px;margin:4px 4px 0 0}
    .badge{background:#fff7ed;border:1px solid #fed7aa;border-radius:18px;padding:16px}
    .answer{display:none;background:#f0fdf4;border-radius:14px;padding:12px;margin-top:10px;color:#166534}
    .qcard{background:#f8fafc;border-radius:16px;padding:16px;margin-bottom:12px}
    .small{font-size:13px}
    .footer{color:#64748b;text-align:center;margin-top:30px}
    @media(max-width:850px){.hero,.two{grid-template-columns:1fr}h1{font-size:32px}.wrap{padding:14px}}
  </style>
</head>
<body>
<div id="app"></div>

<script>
const STORAGE_KEY = "englishReadingAppV2";

const defaultBooks = [
  {
    id:"refugee",
    title:"Refugee",
    author:"Alan Gratz",
    level:"Middle School",
    genre:"Historical Fiction",
    description:"Refugee follows three young people from three different historical moments: Josef, a Jewish boy escaping Nazi Germany in 1938; Isabel, a Cuban girl leaving Cuba in 1994; and Mahmoud, a Syrian boy fleeing war in 2015. Their stories connect through danger, courage, family, survival, and the search for a safe home.",
    themes:"courage, family, survival, identity, home, being seen, responsibility, hope",
    characters:"Josef Landau, Isabel Fernandez, Mahmoud Bishara, and their families",
    setting:"Germany 1938, Cuba 1994, Syria 2015, and refugee journeys across borders."
  }
];

const refugeeChapters = [
["Before Reading","Understand what a refugee is","Before starting Refugee, think about why a family might have to leave home quickly. This book follows three young people in different time periods. While reading, pay attention to what they lose, what they carry, and what gives them hope.",["What does the word refugee mean?","Why might someone be forced to leave home?","What would be hardest for you to leave behind?"],"Prediction: I think this book will show that leaving home can be scary, but family and hope help people keep going."],
["Josef: Early Chapters","Fear and growing up too fast","Josef lives in Germany in 1938. His family is Jewish, and the danger around them is increasing. Watch how Josef begins as a child but is forced to act older because his family is under threat.",["What signs show that Josef's world is becoming unsafe?","How does Josef's family respond to danger?","Why does Josef feel pressure to act like an adult?"],"Sentence starter: Josef is forced to grow up quickly because __________."],
["Isabel: Early Chapters","Hope, music, and family","Isabel lives in Cuba in 1994. Her family struggles with limited freedom and difficult living conditions. Music is important to Isabel because it connects her to family, culture, and hope.",["What does Isabel love about her home?","Why does her family consider leaving Cuba?","How does music help Isabel express herself?"],"Sentence starter: Music matters to Isabel because __________."],
["Mahmoud: Early Chapters","War and invisibility","Mahmoud lives in Syria in 2015 during war. He learns that being noticed can be dangerous, so he often tries to stay invisible. Pay attention to how the author shows fear in everyday life.",["Why does Mahmoud try not to be noticed?","How has war changed normal life for his family?","What does Mahmoud understand that many adults around him may not?"],"Sentence starter: Mahmoud tries to be invisible because __________."],
["The Decision to Leave","When home is no longer safe","All three families reach a point where staying is more dangerous than leaving. Refugees often do not leave because they want adventure; they leave because survival requires it.",["What finally pushes each family to leave?","What risks do they face by leaving?","What risks do they face by staying?"],"Compare: Staying is dangerous because __________, but leaving is also dangerous because __________."],
["The Journey Begins","Uncertainty and courage","Each journey begins with hope, but also with fear. The families must trust boats, strangers, plans, and luck. Track how each child reacts when things do not go as expected.",["What does courage look like for Josef, Isabel, and Mahmoud?","Who helps them at the beginning of the journey?","What is one moment where hope and fear appear together?"],"Evidence note: One brave action I noticed is __________."],
["On the Water","Water as freedom and danger","Water appears in different ways in the novel. For some characters, crossing water means a chance at freedom. But water also becomes dangerous, unpredictable, and frightening.",["How is water connected to hope?","How is water connected to danger?","Compare Josef's and Isabel's journeys by water."],"Theme note: Water represents both __________ and __________."],
["Borders and Rules","Who gets allowed in?","The book shows that safety is not only about reaching another country. Refugees must also face borders, laws, papers, officials, and public opinion.",["Why are borders so important in the book?","How do laws and rules affect families?","What does the book suggest about fairness?"],"Discussion idea: A border can be more than a line because __________."],
["Family Sacrifice","Love during impossible choices","Many characters must make painful choices to protect the people they love. Watch for moments when someone gives up safety, comfort, or opportunity for another person.",["Who makes a sacrifice in the story?","Why is that sacrifice important?","How does family love shape each character's decisions?"],"Evidence note: A sacrifice that matters is __________ because __________."],
["Being Seen","Mahmoud's big idea","One of the strongest ideas in the book is whether refugees are ignored or truly seen. Mahmoud's story helps readers think about visibility, voice, and human dignity.",["What does it mean to be invisible in this book?","When can being invisible feel safe?","When is it important to be seen?"],"Theme note: Being seen matters because __________."],
["How the Stories Connect","Three timelines, one message","The three stories happen in different years, but they are connected by experience, theme, and human choices. The author uses this structure to show that refugee stories are not only one country's story or one time period's story.",["What do Josef, Isabel, and Mahmoud have in common?","How are their situations different?","Why did the author choose three storylines instead of one?"],"Compare: The three characters are different because __________, but similar because __________."],
["After Reading","Theme and responsibility","After finishing the book, think about what Refugee asks from the reader. The book is not only about the past. It asks how people today should respond when families need safety.",["What is the most important lesson of the book?","Which character changed you the most as a reader?","What responsibility do people have toward refugees?"],"Final reflection: Refugee teaches readers that __________."]
];

const vocab = [
["refugee","A person forced to leave home because of war, danger, or persecution.","The family became refugees when staying home was no longer safe."],
["persecution","Cruel or unfair treatment because of identity, religion, race, or beliefs.","Josef's family faces persecution because they are Jewish."],
["asylum","Protection given by a country to someone escaping danger.","Many refugees hope to receive asylum in a safer country."],
["border","A line between countries or regions.","A border can decide whether a family reaches safety."],
["deport","To force someone to leave a country.","Refugees may fear being deported back to danger."],
["dictatorship","A government where one ruler or group has strong control and people have limited freedom.","Isabel's family lives under a government with strict control."],
["resilience","The ability to keep going after hardship.","The three children show resilience during their journeys."],
["trauma","Deep emotional pain after a frightening or harmful experience.","War and escape can leave trauma on families."],
["identity","Who someone is, including culture, family, beliefs, and personal history.","Each character tries to hold onto identity while leaving home."],
["sacrifice","Giving up something important for someone or something else.","Family members make sacrifices to protect each other."],
["inference","A smart guess based on evidence from the text.","Readers can make an inference about Mahmoud's fear from his actions."],
["theme","A big message or lesson in a story.","One theme of Refugee is that courage can appear in many forms."],
["evidence","Details from the text that support an answer.","Use evidence when explaining why a character changes."],
["perspective","A character's point of view or way of seeing events.","The three perspectives help readers understand different refugee experiences."]
];

const quiz = [
  ["Who are the three main child characters?","Josef, Isabel, and Mahmoud."],
  ["What historical period is Josef's story connected to?","Nazi Germany in 1938, before World War II."],
  ["Why does Isabel's family leave Cuba?","They are searching for safety, freedom, and a better future during a difficult time in Cuba."],
  ["Why does Mahmoud try to be invisible?","He believes being unnoticed can help him survive in a dangerous war environment."],
  ["What is one major theme of the book?","One major theme is courage: characters keep going even when they are afraid."]
];

let state = loadState();
let tab = "dashboard";

function loadState(){
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    try { return JSON.parse(saved); } catch(e){}
  }
  return {
    books: defaultBooks,
    selectedId: "refugee",
    done: [],
    notes: "",
    mastered: [],
    badges: [],
    form: {title:"",author:"",level:"Middle School",genre:"",description:"",themes:"",characters:"",setting:""}
  };
}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function selectedBook(){ return state.books.find(b=>b.id===state.selectedId) || state.books[0]; }
function setTab(t){ tab=t; render(); }
function toggleDone(item){
  state.done = state.done.includes(item) ? state.done.filter(x=>x!==item) : [...state.done,item];
  updateBadges(); save(); render();
}
function toggleMastered(word){
  state.mastered = state.mastered.includes(word) ? state.mastered.filter(x=>x!==word) : [...state.mastered,word];
  updateBadges(); save(); render();
}
function updateBadges(){
  const badges = [];
  if(state.done.length >= 3) badges.push("Strong Start");
  if(state.done.length >= 8) badges.push("Reading Champion");
  if(state.mastered.length >= 5) badges.push("Vocab Builder");
  if(state.notes && state.notes.length > 100) badges.push("Thoughtful Note Taker");
  state.badges = badges;
}
function addBook(){
  const f = state.form;
  if(!f.title.trim()) return alert("Please add a book title.");
  const b = {id:"book-"+Date.now(), title:f.title, author:f.author||"Unknown", level:f.level||"Middle School", genre:f.genre||"Fiction", description:f.description||"Add a book overview here.", themes:f.themes||"Add themes here.", characters:f.characters||"Add characters here.", setting:f.setting||"Add setting here."};
  state.books.unshift(b); state.selectedId=b.id; state.form={title:"",author:"",level:"Middle School",genre:"",description:"",themes:"",characters:"",setting:""}; tab="dashboard"; save(); render();
}
function deleteBook(id){
  if(id==="refugee") return;
  state.books = state.books.filter(b=>b.id!==id);
  if(state.selectedId===id) state.selectedId="refugee";
  save(); render();
}
function copyMarkdown(){ navigator.clipboard.writeText(markdown()); alert("Markdown copied!"); }
function resetProgress(){
  if(confirm("Reset progress, vocab mastery, badges, and notes?")){
    state.done=[]; state.mastered=[]; state.badges=[]; state.notes=""; save(); render();
  }
}
function percent(){
  const total = refugeeChapters.length + vocab.length;
  const current = state.done.length + state.mastered.length;
  return Math.min(100, Math.round((current/total)*100));
}
function markdown(){
 const b=selectedBook();
 let guide = b.id==="refugee" ? refugeeChapters.map((c,i)=>`${i+1}. ${c[0]}\nFocus: ${c[1]}\n${c[2]}\nQuestions:\n${c[3].map(q=>"- "+q).join("\n")}\nWriting Help: ${c[4]}`).join("\n\n") : "Add chapter guide here.";
 let voc = b.id==="refugee" ? vocab.map(v=>`- ${v[0]}: ${v[1]} Example: ${v[2]}`).join("\n") : "- Add vocabulary here.";
 return `# ${b.title} Reading Comprehension Guide

Author: ${b.author}
Level: ${b.level}
Genre: ${b.genre}

## Overview
${b.description}

## Characters
${b.characters}

## Setting
${b.setting}

## Themes
${b.themes}

## Guided Reading Path
${guide}

## Vocabulary
${voc}

## Discussion Questions
1. What is the biggest conflict in this book?
2. Which character changes the most?
3. What theme is most important?
4. What evidence supports your answer?
5. What does this book teach about real life?

## Final Reflection
This book is mainly about __________. One character who changed is __________ because __________. A major theme is __________. The author shows this when __________. This book teaches readers that __________.

## My Notes
${state.notes}`;
}

function nav(){
 const items=[["dashboard","Dashboard"],["library","Library"],["add","Add Book"],["chapters","Chapter Guide"],["vocab","Vocabulary"],["quiz","Quiz"],["markdown","Markdown"],["notes","Notes"]];
 return `<div class="nav">${items.map(i=>`<button class="${tab===i[0]?'active':''}" onclick="setTab('${i[0]}')">${i[1]}</button>`).join("")}</div>`;
}

function render(){
 const b=selectedBook();
 const p=percent();
 let content="";
 if(tab==="dashboard"){
   content=`<div class="two">
     <div class="card">
       <h2>${b.title}</h2>
       <p class="muted"><b>${b.author}</b> · ${b.genre} · ${b.level}</p>
       <p style="font-size:18px">${b.description}</p>
       <div class="grid">
         <div class="mini" style="background:#eff6ff"><h3>Main Characters</h3><p>${b.characters}</p></div>
         <div class="mini" style="background:#fff7ed"><h3>Major Themes</h3><p>${b.themes}</p></div>
         <div class="mini" style="background:#f0fdf4"><h3>Setting</h3><p>${b.setting}</p></div>
         <div class="mini" style="background:#faf5ff"><h3>Reading Goal</h3><p>Track characters, conflict, vocabulary, themes, and evidence while reading.</p></div>
       </div>
     </div>
     <div class="progressBox">
       <h2>Reading Progress</h2>
       <div style="font-size:48px;font-weight:bold">${p}%</div>
       <div class="bar"><span style="width:${p}%"></span></div>
       <p>${state.done.length} reading sections done · ${state.mastered.length} vocab words mastered</p>
       <h3>Badges</h3>
       ${state.badges.length ? state.badges.map(x=>`<div class="badge">🏆 ${x}</div>`).join("<br>") : "<p class='muted'>Start reading to earn badges.</p>"}
       <br><button onclick="resetProgress()">Reset Progress</button>
     </div>
   </div>`;
 }
 if(tab==="library"){
   content=`<div class="card"><h2>Book Library</h2><p class="muted">Choose a book. Refugee has a full built-in guide. New books get a reusable reading framework.</p></div><br>
   <div class="grid">${state.books.map(book=>`<div class="card"><h2>${book.title}</h2><p class="muted">by ${book.author}</p><p>${book.description}</p><button class="btn-dark" onclick="state.selectedId='${book.id}';save();setTab('dashboard')">Open</button> ${book.id!=="refugee"?`<button onclick="deleteBook('${book.id}')">Delete</button>`:""}</div>`).join("")}</div>`;
 }
 if(tab==="add"){
   const keys=["title","author","level","genre","description","themes","characters","setting"];
   content=`<div class="card"><h2>Add a New Book</h2><p class="muted">Add your own book. The app will generate a reading guide framework.</p><div class="grid">${keys.map(k=>`<label><b>${k}</b><input value="${(state.form[k]||"").replaceAll('"','&quot;')}" oninput="state.form['${k}']=this.value;save()" placeholder="${k}"></label>`).join("")}</div><br><button class="btn-dark" onclick="addBook()">Generate Book Guide</button></div>`;
 }
 if(tab==="chapters"){
   if(b.id==="refugee"){
     content = refugeeChapters.map((c,i)=>`<div class="chapter"><h2>${i+1}. ${c[0]}</h2><p style="color:#1d4ed8"><b>Focus: ${c[1]}</b></p><p>${c[2]}</p><div class="mini" style="background:#f8fafc"><b>Reading Questions</b><ul>${c[3].map(q=>`<li>${q}</li>`).join("")}</ul><b>Writing Help</b><p>${c[4]}</p></div><br><button class="${state.done.includes(c[0])?'btn-dark':'btn-soft'}" onclick="toggleDone('${c[0].replaceAll("'","\\'")}')">${state.done.includes(c[0])?'Done ✓':'Mark Done'}</button></div>`).join("");
   } else {
     content = `<div class="card"><h2>${b.title} Reading Framework</h2><p>Use this structure while reading your new book:</p>${["Before Reading","Beginning","Middle","Conflict","Character Change","Theme Evidence","Ending","Final Reflection"].map(x=>`<button class="checkRow" onclick="toggleDone('${x}')"><span>${x}</span><span>${state.done.includes(x)?"✅":"○"}</span></button>`).join("")}</div>`;
   }
 }
 if(tab==="vocab"){
   content=`<div class="grid">${(b.id==="refugee"?vocab:[]).map(v=>`<div class="card"><h2>${v[0]}</h2><p>${v[1]}</p><p class="mini" style="background:#eff6ff">Example: ${v[2]}</p><button class="${state.mastered.includes(v[0])?'btn-dark':'btn-soft'}" onclick="toggleMastered('${v[0]}')">${state.mastered.includes(v[0])?'Mastered ✓':'Mark Mastered'}</button></div>`).join("")}</div>`;
   if(b.id!=="refugee") content=`<div class="card"><h2>Vocabulary Builder</h2><p>Add words you find while reading. Use the Markdown tab as your template.</p></div>`;
 }
 if(tab==="quiz"){
   content=`<div class="card"><h2>Quiz with Answers</h2><p class="muted">Try answering first, then click “Show Answer.”</p>${quiz.map((q,i)=>`<div class="qcard"><b>Q${i+1}. ${q[0]}</b><br><button onclick="document.getElementById('a${i}').style.display='block'">Show Answer</button><div class="answer" id="a${i}">${q[1]}</div></div>`).join("")}</div>`;
 }
 if(tab==="markdown"){
   content=`<div class="card"><h2>Generated Markdown</h2><p class="muted">Copy this into Notion, Google Docs, or a reading journal.</p><button class="btn-dark" onclick="copyMarkdown()">Copy Markdown</button><br><br><pre>${markdown().replace(/</g,"&lt;")}</pre></div>`;
 }
 if(tab==="notes"){
   content=`<div class="card"><h2>My Reading Notes</h2><p class="muted">Notes auto-save in this browser.</p><textarea oninput="state.notes=this.value;updateBadges();save()" placeholder="Today I read... I noticed... A question I have is... Evidence I found...">${state.notes||""}</textarea><br><br><button class="btn-dark" onclick="copyMarkdown()">Copy Notes in Markdown</button></div>`;
 }
 document.getElementById("app").innerHTML=`<div class="wrap">
   <div class="hero"><div><h1>English Reading and Comprehension App V2</h1><p class="muted">A student-friendly reading platform for comprehension, vocabulary, notes, progress, quizzes, and final reflections.</p><span class="pill">Default Book: Refugee</span><span class="pill">Auto-save Progress</span><span class="pill">Markdown Export</span></div><div class="progressBox"><div class="small">Current Progress</div><div style="font-size:42px;font-weight:bold">${p}%</div><div class="bar"><span style="width:${p}%"></span></div></div></div>
   ${nav()}
   ${content}
   <div class="footer">Built for independent reading practice · V2</div>
 </div>`;
}
render();
</script>
</body>
</html>
